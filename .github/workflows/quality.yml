name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test tooling
        run: python -m pip install pytest

      - name: Install CLI development dependencies
        if: ${{ hashFiles('apps/cli/pyproject.toml') != '' }}
        run: python -m pip install -e './apps/cli[dev]'

      - name: Set up Node.js
        if: ${{ hashFiles('package-lock.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install workspace dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Lint repository scripts
        run: ./scripts/lint-repo.sh

      - name: Check docs and guardrails
        run: ./scripts/check-docs.sh

      - name: Lint tracked frontend workspace
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm run lint

      - name: Build tracked frontend workspace
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm run build

      - name: Validate Docker Compose config
        run: docker compose -f compose.yaml config >/dev/null

  repository-tests:
    runs-on: ubuntu-latest
    needs: repository-quality
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test tooling
        run: python -m pip install pytest

      - name: Install CLI development dependencies
        if: ${{ hashFiles('apps/cli/pyproject.toml') != '' }}
        run: python -m pip install -e './apps/cli[dev]'

      - name: Install API development dependencies
        if: ${{ hashFiles('apps/api/pyproject.toml') != '' }}
        run: python -m pip install -e './apps/api[dev]'

      - name: Set up Node.js
        if: ${{ hashFiles('package-lock.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install workspace dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Run backend test entry point
        run: ./scripts/run-backend-tests.sh

      - name: Run frontend test entry point
        run: ./scripts/run-frontend-tests.sh

      - name: Run CLI test entry point
        run: ./scripts/run-cli-tests.sh

      - name: Run CLI smoke entry point
        run: ./scripts/smoke-cli.sh

      - name: Run data validation entry point
        run: ./scripts/run-data-validation.sh

      - name: Install Playwright browser
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end entry point
        run: ./scripts/run-e2e.sh

  docker-bootstrap-builds:
    runs-on: ubuntu-latest
    needs: repository-quality
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build bootstrap API image
        run: docker build -f docker/api.Dockerfile .

      - name: Build bootstrap web image
        run: docker build -f docker/web.Dockerfile .

  self-hosting-smoke:
    runs-on: ubuntu-latest
    needs: repository-quality
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test tooling
        run: python -m pip install pytest

      - name: Install CLI development dependencies
        if: ${{ hashFiles('apps/cli/pyproject.toml') != '' }}
        run: python -m pip install -e './apps/cli[dev]'

      - name: Set up Node.js
        if: ${{ hashFiles('package-lock.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install workspace dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Run Docker Compose smoke test
        run: ./scripts/smoke-compose.sh
